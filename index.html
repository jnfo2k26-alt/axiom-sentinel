<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>AXIOM SENTINEL — Live Trading</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@solana/web3.js@1.91.0/lib/index.iife.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;900&family=Quicksand:wght@300;400;500;600;700&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --gold:#d4a542;--gold-light:#f0d68a;--gold-dark:#8a6d2b;--amber:#e8952e;
  --deep-blue:#1a1f3a;--darker-blue:#0d1020;--navy:#151933;
  --emerald:#2ecc71;--emerald-dark:#1a9c54;--ruby:#e74c3c;
  --card-bg:rgba(18,22,48,0.92);--card-border:rgba(212,165,66,0.15);
  --text-primary:#e8e0d0;--text-secondary:#9a94a8;--text-muted:#5d5873;
  --radius:14px;--radius-sm:8px;
}
html{scroll-behavior:smooth}
body{font-family:'Quicksand',sans-serif;background:var(--darker-blue);color:var(--text-primary);min-height:100vh;overflow-x:hidden;line-height:1.5}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 80% 50% at 20% 10%,rgba(212,165,66,.06) 0%,transparent 60%),radial-gradient(ellipse 60% 60% at 80% 80%,rgba(46,204,113,.04) 0%,transparent 60%);pointer-events:none;z-index:0}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:var(--darker-blue)}::-webkit-scrollbar-thumb{background:var(--gold-dark);border-radius:3px}

.app{position:relative;z-index:1;max-width:1480px;margin:0 auto;padding:16px}

/* HEADER */
.header{display:flex;align-items:center;justify-content:space-between;padding:14px 22px;background:var(--card-bg);border:1px solid var(--card-border);border-radius:var(--radius);margin-bottom:16px;backdrop-filter:blur(12px)}
.header-left{display:flex;align-items:center;gap:14px}
.sentinel-icon{width:44px;height:44px;background:linear-gradient(135deg,var(--gold),var(--amber));border-radius:11px;display:flex;align-items:center;justify-content:center;font-size:22px;box-shadow:0 0 20px rgba(212,165,66,.3);animation:pulseG 3s ease-in-out infinite}
@keyframes pulseG{0%,100%{box-shadow:0 0 15px rgba(212,165,66,.3)}50%{box-shadow:0 0 30px rgba(212,165,66,.5)}}
.header-title{font-family:'Cinzel',serif;font-size:20px;font-weight:700;background:linear-gradient(135deg,var(--gold-light),var(--gold),var(--amber));-webkit-background-clip:text;-webkit-text-fill-color:transparent;letter-spacing:2px}
.header-sub{font-size:10px;color:var(--text-secondary);letter-spacing:3px;text-transform:uppercase}
.header-right{display:flex;align-items:center;gap:14px}
.wallet-btn{padding:8px 18px;background:linear-gradient(135deg,var(--gold-dark),var(--gold));border:none;border-radius:20px;color:#fff;font-family:'Quicksand',sans-serif;font-size:12px;font-weight:700;cursor:pointer;letter-spacing:.5px;transition:all .3s;box-shadow:0 0 15px rgba(212,165,66,.2)}
.wallet-btn:hover{box-shadow:0 0 25px rgba(212,165,66,.4);transform:translateY(-1px)}
.wallet-btn.connected{background:linear-gradient(135deg,var(--emerald-dark),var(--emerald))}
.status-badge{display:flex;align-items:center;gap:7px;padding:7px 14px;border-radius:20px;font-size:12px;font-weight:600;border:1px solid}
.status-badge.online{background:rgba(46,204,113,.08);border-color:rgba(46,204,113,.3);color:var(--emerald)}
.status-badge.offline{background:rgba(231,76,60,.08);border-color:rgba(231,76,60,.3);color:var(--ruby)}
.status-badge.demo{background:rgba(243,156,18,.08);border-color:rgba(243,156,18,.3);color:#f39c12}
.status-dot{width:7px;height:7px;border-radius:50%;animation:blink 2s ease-in-out infinite}
.status-badge.online .status-dot{background:var(--emerald)}
.status-badge.offline .status-dot{background:var(--ruby)}
.status-badge.demo .status-dot{background:#f39c12}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
.mode-toggle{display:flex;border-radius:8px;overflow:hidden;border:1px solid rgba(255,255,255,.08)}
.mode-btn{padding:6px 14px;background:rgba(255,255,255,.03);border:none;color:var(--text-muted);font-family:'Quicksand',sans-serif;font-size:11px;font-weight:600;cursor:pointer;transition:all .3s}
.mode-btn.active{background:rgba(212,165,66,.15);color:var(--gold-light)}

/* GRID */
.grid{display:grid;grid-template-columns:1fr 1fr 320px;gap:14px}
.span2{grid-column:span 2}.span3{grid-column:span 3}

/* CARD */
.card{background:var(--card-bg);border:1px solid var(--card-border);border-radius:var(--radius);padding:18px;backdrop-filter:blur(12px);transition:border-color .3s,box-shadow .3s}
.card:hover{border-color:rgba(212,165,66,.3);box-shadow:0 4px 30px rgba(0,0,0,.3)}
.card-h{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.card-t{font-family:'Cinzel',serif;font-size:13px;font-weight:600;color:var(--gold-light);letter-spacing:1.5px;text-transform:uppercase}
.card-badge{font-size:11px;padding:3px 10px;border-radius:12px;font-weight:600}

/* STATS */
.stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
.stat-box{text-align:center;padding:14px 6px;background:rgba(255,255,255,.025);border-radius:var(--radius-sm);border:1px solid rgba(255,255,255,.03)}
.stat-val{font-family:'JetBrains Mono',monospace;font-size:22px;font-weight:500;margin-bottom:2px}
.stat-val.pos{color:var(--emerald)}.stat-val.neg{color:var(--ruby)}
.stat-lbl{font-size:10px;color:var(--text-secondary);text-transform:uppercase;letter-spacing:1px}

/* XP */
.xp-sec{margin-top:14px}
.xp-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.lvl-badge{display:flex;align-items:center;gap:6px;font-family:'Cinzel',serif;font-weight:700;font-size:15px;color:var(--gold)}
.xp-txt{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--text-secondary)}
.xp-outer{width:100%;height:10px;background:rgba(255,255,255,.05);border-radius:5px;overflow:hidden}
.xp-inner{height:100%;background:linear-gradient(90deg,var(--gold),var(--gold-light),var(--amber));border-radius:5px;transition:width .8s cubic-bezier(.25,.46,.45,.94);position:relative}
.xp-inner::after{content:'';position:absolute;inset:0;background:linear-gradient(90deg,transparent,rgba(255,255,255,.3),transparent);animation:shimmer 2s ease-in-out infinite}
@keyframes shimmer{0%{transform:translateX(-100%)}100%{transform:translateX(100%)}}

/* HEALTH */
.hp-sec{margin-top:10px}.hp-lbl{display:flex;justify-content:space-between;font-size:10px;color:var(--text-secondary);margin-bottom:3px}
.hp-outer{height:7px;background:rgba(255,255,255,.05);border-radius:4px;overflow:hidden}
.hp-inner{height:100%;border-radius:4px;transition:width .5s,background .5s}

/* PERKS */
.perks{display:flex;gap:6px;margin-top:12px;flex-wrap:wrap}
.perk{display:flex;align-items:center;gap:5px;padding:4px 10px;border-radius:16px;font-size:10px;font-weight:600;border:1px solid;transition:all .3s}
.perk.on{background:rgba(212,165,66,.1);border-color:rgba(212,165,66,.35);color:var(--gold-light)}
.perk.off{background:rgba(255,255,255,.02);border-color:rgba(255,255,255,.06);color:var(--text-muted);filter:grayscale(1)}

/* TOKEN LIST */
.tok-scroll{max-height:440px;overflow-y:auto;display:flex;flex-direction:column;gap:6px}
.tok-hdr{display:grid;grid-template-columns:2.2fr 1fr 1fr .8fr 70px;gap:8px;padding:0 10px 8px;font-size:9px;color:var(--text-muted);text-transform:uppercase;letter-spacing:1px;border-bottom:1px solid rgba(255,255,255,.04);margin-bottom:6px}
.tok-row{display:grid;grid-template-columns:2.2fr 1fr 1fr .8fr 70px;align-items:center;gap:8px;padding:10px;background:rgba(255,255,255,.018);border-radius:var(--radius-sm);border:1px solid rgba(255,255,255,.03);font-size:12px;transition:all .2s;cursor:pointer}
.tok-row:hover{background:rgba(212,165,66,.05);border-color:rgba(212,165,66,.12)}
.tok-name{font-weight:700;color:var(--text-primary);font-size:13px}
.tok-pair{font-size:10px;color:var(--text-muted)}
.tok-price{font-family:'JetBrains Mono',monospace;font-size:11px}
.tok-chg{font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:600}
.sig-pill{padding:3px 9px;border-radius:10px;font-size:9px;font-weight:700;text-align:center;text-transform:uppercase;letter-spacing:.3px}
.sig-s{background:rgba(46,204,113,.12);color:var(--emerald);border:1px solid rgba(46,204,113,.25)}
.sig-m{background:rgba(243,156,18,.12);color:#f39c12;border:1px solid rgba(243,156,18,.25)}
.sig-w{background:rgba(255,255,255,.04);color:var(--text-secondary);border:1px solid rgba(255,255,255,.08)}

/* POSITIONS */
.pos-area{display:flex;flex-direction:column;gap:8px;max-height:320px;overflow-y:auto}
.pos-card{padding:12px;background:rgba(255,255,255,.025);border-radius:var(--radius-sm);border:1px solid rgba(255,255,255,.05);transition:all .3s}
.pos-card.win{border-left:3px solid var(--emerald)}.pos-card.lose{border-left:3px solid var(--ruby)}
.pos-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.pos-tok{font-weight:700;font-size:14px}
.pos-pnl{font-family:'JetBrains Mono',monospace;font-weight:600;font-size:13px}
.pos-det{display:flex;gap:14px;font-size:10px;color:var(--text-secondary);margin-bottom:8px;flex-wrap:wrap}
.pos-det span{color:var(--text-primary);font-weight:500}
.pos-prog{display:flex;align-items:center;gap:6px;font-size:9px;color:var(--text-muted);margin-top:3px}
.prog-bar{flex:1;height:3px;background:rgba(255,255,255,.05);border-radius:2px;overflow:hidden}
.prog-fill{height:100%;border-radius:2px;transition:width .5s}
.pos-actions{display:flex;gap:6px;margin-top:8px}

/* CONFIRM MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);backdrop-filter:blur(4px);z-index:1000;display:flex;align-items:center;justify-content:center;animation:fadeIn .2s}
.modal{background:var(--deep-blue);border:1px solid var(--card-border);border-radius:var(--radius);padding:24px;max-width:420px;width:90%;box-shadow:0 20px 60px rgba(0,0,0,.5)}
.modal h3{font-family:'Cinzel',serif;color:var(--gold-light);font-size:16px;margin-bottom:14px}
.modal-info{display:flex;flex-direction:column;gap:8px;margin-bottom:18px;font-size:13px}
.modal-info div{display:flex;justify-content:space-between}
.modal-info div span:last-child{font-family:'JetBrains Mono',monospace;color:var(--text-primary);font-weight:500}
.modal-btns{display:flex;gap:10px}
.modal-btns button{flex:1;padding:10px;border:none;border-radius:var(--radius-sm);font-family:'Quicksand',sans-serif;font-size:13px;font-weight:700;cursor:pointer;transition:all .2s}
.btn-confirm{background:linear-gradient(135deg,var(--emerald-dark),var(--emerald));color:#fff}
.btn-confirm:hover{box-shadow:0 0 20px rgba(46,204,113,.3)}
.btn-cancel{background:rgba(255,255,255,.06);color:var(--text-secondary);border:1px solid rgba(255,255,255,.1)!important}
.btn-cancel:hover{background:rgba(231,76,60,.1);color:var(--ruby)}

/* BUTTONS */
.btn-sm{padding:5px 11px;border:1px solid rgba(255,255,255,.08);border-radius:6px;background:rgba(255,255,255,.03);color:var(--text-secondary);font-size:10px;font-family:'Quicksand',sans-serif;font-weight:600;cursor:pointer;transition:all .2s}
.btn-sm:hover{background:rgba(212,165,66,.08);border-color:rgba(212,165,66,.25);color:var(--gold-light)}
.btn-sm.danger:hover{background:rgba(231,76,60,.08);border-color:rgba(231,76,60,.25);color:var(--ruby)}

/* CONTROLS */
.ctrl-grid{display:flex;flex-direction:column;gap:12px}
.ctrl-grp label{display:flex;justify-content:space-between;font-size:11px;color:var(--text-secondary);margin-bottom:5px}
.ctrl-grp label span{font-family:'JetBrains Mono',monospace;color:var(--gold-light);font-size:11px}
input[type="range"]{-webkit-appearance:none;width:100%;height:5px;background:rgba(255,255,255,.07);border-radius:3px;outline:none}
input[type="range"]::-webkit-slider-thumb{-webkit-appearance:none;width:16px;height:16px;background:linear-gradient(135deg,var(--gold),var(--amber));border-radius:50%;cursor:pointer;box-shadow:0 0 8px rgba(212,165,66,.4)}
.sig-toggles{display:flex;flex-direction:column;gap:6px}
.sig-tog{display:flex;align-items:center;justify-content:space-between;padding:7px 10px;background:rgba(255,255,255,.025);border-radius:var(--radius-sm);font-size:11px}
.mtog{width:34px;height:17px;background:rgba(255,255,255,.1);border-radius:9px;cursor:pointer;position:relative;border:none;transition:background .3s}
.mtog.on{background:rgba(46,204,113,.35)}
.mtog::after{content:'';position:absolute;top:2px;left:2px;width:13px;height:13px;background:var(--text-secondary);border-radius:50%;transition:all .3s}
.mtog.on::after{left:17px;background:var(--emerald)}
.risk-row{display:flex;gap:5px}
.risk-btn{flex:1;padding:7px;border:1px solid rgba(255,255,255,.08);border-radius:var(--radius-sm);background:rgba(255,255,255,.025);color:var(--text-secondary);font-family:'Quicksand',sans-serif;font-size:10px;font-weight:600;cursor:pointer;transition:all .3s;text-align:center}
.risk-btn.active{background:rgba(212,165,66,.12);border-color:var(--gold);color:var(--gold-light);box-shadow:0 0 12px rgba(212,165,66,.15)}

/* HISTORY */
.hist-tbl{width:100%;font-size:11px;border-collapse:collapse}
.hist-tbl th{text-align:left;padding:7px 8px;font-size:9px;color:var(--text-muted);text-transform:uppercase;letter-spacing:1px;border-bottom:1px solid rgba(255,255,255,.05)}
.hist-tbl td{padding:8px;border-bottom:1px solid rgba(255,255,255,.02);color:var(--text-secondary)}
.hist-tbl td:first-child{color:var(--text-primary);font-weight:600}
.hist-scroll{max-height:250px;overflow-y:auto}

/* CHART */
.chart-wrap{position:relative;height:190px;margin-top:10px}

/* PERF */
.perf-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.perf-stat{text-align:center;padding:12px 6px;background:rgba(255,255,255,.02);border-radius:var(--radius-sm)}
.perf-stat .big{font-family:'JetBrains Mono',monospace;font-size:18px;font-weight:500;margin-bottom:2px}
.perf-stat .lbl{font-size:9px;color:var(--text-muted);text-transform:uppercase;letter-spacing:1px}
.wr-wrap{display:flex;justify-content:center;margin-bottom:12px}
.wr-circ{position:relative;width:90px;height:90px}
.wr-circ svg{transform:rotate(-90deg)}
.wr-circ .trk{fill:none;stroke:rgba(255,255,255,.05);stroke-width:7}
.wr-circ .ring{fill:none;stroke:var(--emerald);stroke-width:7;stroke-linecap:round;stroke-dasharray:264;stroke-dashoffset:264;transition:stroke-dashoffset 1s}
.wr-val{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-family:'JetBrains Mono',monospace;font-size:18px;font-weight:600}

/* LOG */
.log-area{display:flex;flex-direction:column;gap:6px;max-height:200px;overflow-y:auto}
.log-e{display:flex;align-items:flex-start;gap:8px;padding:8px;background:rgba(255,255,255,.018);border-radius:var(--radius-sm);font-size:11px;color:var(--text-secondary);border-left:2px solid var(--gold-dark)}
.log-e .li{font-size:15px;flex-shrink:0}.log-e .lt{line-height:1.4}.log-e .lti{font-size:9px;color:var(--text-muted);margin-top:2px}
.achv-row{display:flex;gap:6px;flex-wrap:wrap;margin-top:10px}
.achv{display:flex;align-items:center;gap:5px;padding:5px 10px;border-radius:16px;font-size:10px;font-weight:600;background:rgba(212,165,66,.07);border:1px solid rgba(212,165,66,.18);color:var(--gold-light)}

/* WARN BANNER */
.warn-banner{padding:10px 18px;background:rgba(231,76,60,.08);border:1px solid rgba(231,76,60,.2);border-radius:var(--radius-sm);margin-bottom:14px;font-size:12px;color:#ec7063;display:flex;align-items:center;gap:10px}
.warn-banner.info{background:rgba(243,156,18,.08);border-color:rgba(243,156,18,.2);color:#f39c12}

/* NOTIF */
.notif{position:fixed;top:16px;right:16px;padding:12px 18px;background:var(--card-bg);border:1px solid var(--card-border);border-radius:var(--radius-sm);backdrop-filter:blur(10px);z-index:1001;animation:nSlide .4s ease,nFade .4s ease 3s forwards;font-size:12px;font-weight:600;max-width:340px;box-shadow:0 8px 30px rgba(0,0,0,.4)}
.notif.win{border-left:3px solid var(--emerald);color:var(--emerald)}
.notif.loss{border-left:3px solid var(--ruby);color:var(--ruby)}
.notif.info{border-left:3px solid var(--gold);color:var(--gold-light)}
@keyframes nSlide{from{transform:translateX(100px);opacity:0}to{transform:translateX(0);opacity:1}}
@keyframes nFade{to{opacity:0;transform:translateY(-20px)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}

.empty{text-align:center;padding:28px;color:var(--text-muted);font-size:12px}

/* SOL input */
.sol-display{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--text-secondary);padding:3px 8px;background:rgba(255,255,255,.04);border-radius:4px}

.live-dot{display:inline-block;width:6px;height:6px;background:var(--ruby);border-radius:50%;margin-right:4px;animation:blink 1s ease-in-out infinite}
.live-dot.on{background:var(--emerald)}

@media(max-width:1200px){.grid{grid-template-columns:1fr 1fr}.span3{grid-column:span 2}}
@media(max-width:768px){.grid{grid-template-columns:1fr}.span2,.span3{grid-column:span 1}.stats-row{grid-template-columns:repeat(2,1fr)}.header{flex-direction:column;gap:10px;text-align:center}.header-right{flex-wrap:wrap;justify-content:center}.tok-hdr{display:none}.tok-row{grid-template-columns:1fr 1fr}}
</style>
</head>
<body>
<div id="app"></div>
<script>
// ============================================================
// AXIOM SENTINEL v2 — Production Trading Bot
// Real DexScreener + Jupiter + Phantom Wallet Integration
// ============================================================

const JUPITER_QUOTE_API = 'https://quote-api.jup.ag/v6';
const JUPITER_PRICE_API = 'https://api.jup.ag/price/v2';
const DEXSCREENER_API = 'https://api.dexscreener.com/latest/dex';
const SOL_MINT = 'So11111111111111111111111111111111111111112';
const USDC_MINT = 'EPjFWdd5AufqSSqeM2qN1xzybapC8G4wEGGkZwyTDt1v';
const LAMPORTS = 1e9;

// ---- STATE ----
const DEFAULTS = {
  mode: 'demo', // 'demo' | 'semi' | 'auto'
  walletConnected: false,
  walletAddress: '',
  walletBalance: 0,
  portfolio: 2.0,
  startingPortfolio: 2.0,
  positions: [],
  history: [],
  xp: 0, level: 1,
  totalTrades: 0, wins: 0, losses: 0,
  bestTrade: 0, worstTrade: 0,
  portfolioHistory: [2.0],
  timeLabels: [timeNow()],
  signalWeights: { rsi: 1.0, volume: 1.0, ema: 1.0, liquidity: 1.0 },
  signalsEnabled: { rsi: true, volume: true, ema: true, liquidity: true },
  settings: { posSize: 15, slippage: 15, tp: 15, sl: 8, risk: 'balanced' },
  achievements: [],
  rugAvoided: 0, tokensScanned: 0,
  scannerTokens: [],
  priceCache: {},
  learningLogs: [{ icon: '🚀', text: 'Sentinel initialisé. Prêt à analyser le marché Solana.', time: Date.now() }],
  botCreatedAt: Date.now()
};

let S = loadState();
let chart = null;
let intervals = {};
let pendingTrade = null;
let solUsdPrice = 0;
let engineRunning = false;

// Fetch real SOL/USD price
async function fetchSolPrice() {
  try {
    const r = await fetch('https://api.coingecko.com/api/v3/simple/price?ids=solana&vs_currencies=usd');
    const d = await r.json();
    if (d.solana?.usd) { solUsdPrice = d.solana.usd; updateDollarDisplay(); }
  } catch(e) {
    // Fallback: try DexScreener SOL/USDC pair
    try {
      const r2 = await fetch('https://api.dexscreener.com/latest/dex/pairs/solana/8sLbNZoA1cfnvMJLPfp98ZLAnFSYCFApfJKMbiXNLwxj');
      const d2 = await r2.json();
      if (d2.pair?.priceUsd) { solUsdPrice = parseFloat(d2.pair.priceUsd); updateDollarDisplay(); }
    } catch(e2) { console.warn('SOL price fetch failed'); }
  }
}

function updateDollarDisplay() {
  const el = document.getElementById('portValUsd');
  if (!el || !solUsdPrice) return;
  const total = getTotalPortfolio();
  const usd = total * solUsdPrice;
  el.textContent = '$' + usd.toFixed(2);
  // Also update position PnL in USD
  const pnlUsdEl = document.getElementById('pnlValUsd');
  if (pnlUsdEl) {
    const pnlSol = total - S.startingPortfolio;
    const pnlUsd = pnlSol * solUsdPrice;
    pnlUsdEl.textContent = (pnlUsd >= 0 ? '+$' : '-$') + Math.abs(pnlUsd).toFixed(2);
    pnlUsdEl.style.color = pnlUsd >= 0 ? 'var(--emerald)' : 'var(--ruby)';
  }
  // SOL price display
  const solPrEl = document.getElementById('solPriceVal');
  if (solPrEl) solPrEl.textContent = '$' + solUsdPrice.toFixed(2);
}

function loadState() {
  try {
    const ver = localStorage.getItem('axs2_ver');
    if (ver !== 'v7') { localStorage.removeItem('axs2'); localStorage.setItem('axs2_ver', 'v7'); }
    const s = localStorage.getItem('axs2');
    if (s) {
      const parsed = JSON.parse(s);
      // Deep merge with defaults to handle missing keys
      const merged = { ...DEFAULTS };
      for (const k of Object.keys(DEFAULTS)) {
        if (parsed[k] !== undefined && parsed[k] !== null) {
          if (typeof DEFAULTS[k] === 'object' && !Array.isArray(DEFAULTS[k])) {
            merged[k] = { ...DEFAULTS[k], ...parsed[k] };
          } else {
            merged[k] = parsed[k];
          }
        }
      }
      return merged;
    }
  } catch(e) {
    console.error('Load state error:', e);
    localStorage.removeItem('axs2');
  }
  return { ...DEFAULTS };
}
function saveState() { try { localStorage.setItem('axs2', JSON.stringify(S)); } catch(e) {} }
function timeNow() { return new Date().toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'}); }
function fmt(n, d=3) { return parseFloat(n).toFixed(d); }
function fmtUSD(n) { return n >= 1e6 ? (n/1e6).toFixed(1)+'M' : n >= 1e3 ? (n/1e3).toFixed(0)+'k' : n.toFixed(0); }
function fmtDur(ms) { const s=Math.floor(ms/1000); if(s<60) return s+'s'; const m=Math.floor(s/60); if(m<60) return m+'min'; return Math.floor(m/60)+'h'+m%60+'m'; }

// WALLET CONNECTION (Phantom)
// ============================================================
async function connectWallet() {
  if (S.walletConnected) { disconnectWallet(); return; }
  try {
    if (!window.solana || !window.solana.isPhantom) {
      notify('Phantom Wallet non détecté. Installez-le depuis phantom.app', 'loss');
      return;
    }
    const resp = await window.solana.connect();
    S.walletAddress = resp.publicKey.toString();
    S.walletConnected = true;
    await fetchWalletBalance();
    S.startingPortfolio = S.tradeableBalance || S.walletBalance;
    S.portfolio = S.tradeableBalance || S.walletBalance;
    S.portfolioHistory = [S.portfolio];
    adaptToBalance();
    notify(`Wallet connecté: ${S.walletAddress.slice(0,4)}...${S.walletAddress.slice(-4)} — ${fmt(S.walletBalance)} SOL`, 'info');
    addLog('🔗', `Wallet connecté: ${S.walletAddress.slice(0,6)}...${S.walletAddress.slice(-4)} — ${fmt(S.walletBalance)} SOL (${fmt(S.tradeableBalance || S.walletBalance)} tradeable)`);
    saveState();
    renderAll();
  } catch(e) {
    notify('Connexion refusée ou erreur: ' + e.message, 'loss');
  }
}

function disconnectWallet() {
  if (window.solana) window.solana.disconnect();
  S.walletConnected = false;
  S.walletAddress = '';
  S.walletBalance = 0;
  S.mode = 'demo';
  notify('Wallet déconnecté — mode démo activé', 'info');
  saveState();
  renderAll();
}

async function fetchWalletBalance() {
  if (!S.walletConnected) return;
  try {
    if (window.solanaWeb3 && window.solanaWeb3.Connection) {
      const conn = new window.solanaWeb3.Connection('https://api.mainnet-beta.solana.com');
      const pubkey = new window.solanaWeb3.PublicKey(S.walletAddress);
      const bal = await conn.getBalance(pubkey);
      S.walletBalance = bal / LAMPORTS;
      // Sync portfolio to wallet balance (minus open positions value)
      const openPosValue = S.positions.filter(p => p.mode === 'live').reduce((s, p) => s + p.solAmount, 0);
      S.portfolio = Math.max(0, S.walletBalance - openPosValue);
      adaptToBalance();
    }
  } catch(e) {
    console.warn('Balance fetch failed:', e);
  }
}

// ============================================================
// ADAPTIVE BALANCE MANAGEMENT
// ============================================================
function adaptToBalance() {
  const bal = S.walletConnected ? S.walletBalance : S.portfolio;
  if (bal <= 0) return;

  // Safety reserve: always keep enough for TX fees (0.01 SOL min)
  const FEE_RESERVE = 0.015;
  const tradeable = Math.max(0, bal - FEE_RESERVE);

  // Store tradeable amount for position sizing
  S.tradeableBalance = tradeable;

  // Adaptive max positions based on balance
  // < 0.5 SOL: 2 positions max (concentrate capital)
  // 0.5-2 SOL: 3 positions
  // 2-10 SOL: 4 positions
  // > 10 SOL: 5 positions
  if (tradeable < 0.5) S.maxPositions = 2;
  else if (tradeable < 2) S.maxPositions = 3;
  else if (tradeable < 10) S.maxPositions = 4;
  else S.maxPositions = 5;

  // Adaptive position size % based on balance
  // Small balance = bigger % per trade (to have meaningful positions)
  // Large balance = smaller % (diversification)
  if (tradeable < 0.5) S.adaptivePosSize = 40; // 40% per trade
  else if (tradeable < 2) S.adaptivePosSize = 25;
  else if (tradeable < 5) S.adaptivePosSize = 18;
  else if (tradeable < 20) S.adaptivePosSize = 12;
  else S.adaptivePosSize = 8;

  // Adaptive min position size
  // For small wallets: lower minimum so they can still trade
  if (tradeable < 1) S.minPosSize = 0.02;
  else if (tradeable < 5) S.minPosSize = 0.05;
  else S.minPosSize = 0.1;

  // Adaptive risk: small balance = tighter SL to protect capital
  if (!S.learn) return;
  if (tradeable < 1) {
    S.learn.dynamicSL = Math.min(S.learn.dynamicSL || S.settings.sl, 6);
    S.learn.dynamicTP = Math.max(S.learn.dynamicTP || S.settings.tp, 12);
  }

  // Log balance adaptation on significant changes
  if (!S._lastAdaptLog || Math.abs(tradeable - S._lastAdaptLog) > tradeable * 0.1) {
    S._lastAdaptLog = tradeable;
    addLog('💰', `Adaptation au solde: ${fmt(tradeable)} SOL disponible — Max ${S.maxPositions} positions, taille ${S.adaptivePosSize}%, min ${S.minPosSize} SOL`);
  }
}

      'EKpQGSJtjMFqKZ9KQanSqYXRcF8fBopzLHYxdM65zcjm', // WIF

      if (!seen[addr] || (p.liquidity?.usd || 0) > (seen[addr].liquidity?.usd || 0)) {

    const filtered = unique.filter(p =>
      (p.liquidity?.usd || 0) >= 5000 &&
      (p.volume?.h24 || 0) >= 3000
    );

    // Map to our format
    S.scannerTokens = filtered.map(p => {
      const token = {
        name: p.baseToken?.symbol || '???',

      };

      // Generate signals from REAL data

    });

}

function computeRealSignals(token) {
  // RSI approximation from multi-timeframe price changes
  const changes = [token.change5m, token.change1h / 12, token.change24h / 288];
  const gains = changes.filter(x => x > 0);
  const losses = changes.filter(x => x < 0).map(Math.abs);
  const avgGain = gains.length ? gains.reduce((a,b)=>a+b,0)/gains.length : 0;
  const avgLoss = losses.length ? losses.reduce((a,b)=>a+b,0)/losses.length : 0.01;
  const rs = avgGain / avgLoss;
  const rsi = 100 - (100 / (1 + rs));
  // More granular RSI scoring — reward deep oversold, penalize overbought harder
  const rsiSignal = rsi < 20 ? 1.0 : rsi < 30 ? 0.85 : rsi < 40 ? 0.5 : rsi < 50 ? 0.15 : rsi < 60 ? -0.1 : rsi < 70 ? -0.3 : rsi < 80 ? -0.6 : -0.9;

  // Volume signal: buy pressure + volume-to-liquidity ratio (volume acceleration)
  const buys = token.txns?.buys || 0;
  const sells = token.txns?.sells || 0;
  const totalTxns = buys + sells;
  const buyPressure = totalTxns > 0 ? buys / totalTxns : 0.5;
  const volLiqRatio = token.liquidity > 0 ? token.volume / token.liquidity : 0;
  // Volume acceleration: high volume relative to liquidity = strong interest
  const volAccel = volLiqRatio > 3 ? 1.0 : volLiqRatio > 1.5 ? 0.7 : volLiqRatio > 0.5 ? 0.4 : 0.1;
  // Combined volume signal: buy pressure weighted with acceleration
  const volumeSignal = (buyPressure > 0.65 ? 1.0 : buyPressure > 0.55 ? 0.6 : buyPressure > 0.5 ? 0.25 : buyPressure > 0.4 ? -0.2 : -0.5) * 0.6 + volAccel * 0.4;

  // Anti-FOMO filter: penalize tokens that already pumped hard
  const alreadyPumped = token.change1h > 30 || token.change5m > 15;
  const fomopenalty = alreadyPumped ? -0.4 : 0;

  // Momentum: multi-timeframe trend alignment with acceleration detection
  const momentum5m = token.change5m;
  const momentum1h = token.change1h;
  const momentum24h = token.change24h;
  // Best entry: 1h pulling back while 24h trend is up (dip-buying)
  const isDipBuy = momentum5m < 0 && momentum5m > -5 && momentum1h > 0 && momentum24h > 0;
  // Strong trend continuation: all positive and accelerating
  const isTrendCont = momentum5m > 0 && momentum1h > 0 && momentum5m > momentum1h / 12;
  const trendAlignment = isDipBuy ? 0.9 : isTrendCont ? 0.75 : (momentum5m > 0 && momentum1h > 0) ? 0.6 : (momentum5m > 0 || momentum1h > 0) ? 0.2 : -0.4;

  // Liquidity depth — smooth scoring
  const liqScore = Math.min(1.0, Math.max(0.05, (Math.log10(Math.max(token.liquidity, 1000)) - 3) / 2.5));

  // Rug risk indicators — more comprehensive
  const isRugRisk = token.liquidity < 10000 || token.pairAge < 1 || (sells > buys * 3) ||
    (token.change5m < -20) || (volLiqRatio > 10 && buyPressure < 0.3);

  // Confidence score (how many signals agree)
  const signalValues = [rsiSignal, volumeSignal, trendAlignment, liqScore];
  const positiveSignals = signalValues.filter(v => v > 0.3).length;
  const confidence = positiveSignals / signalValues.length; // 0 to 1

  const w = S.signalWeights;
  const en = S.signalsEnabled;
  let totalW = 0, totalS = 0;
  if (en.rsi) { totalS += rsiSignal * w.rsi; totalW += w.rsi; }
  if (en.volume) { totalS += volumeSignal * w.volume; totalW += w.volume; }
  if (en.ema) { totalS += trendAlignment * w.ema; totalW += w.ema; }
  if (en.liquidity) { totalS += liqScore * w.liquidity; totalW += w.liquidity; }

  let composite = totalW > 0 ? totalS / totalW : 0;
  composite += fomopenalty; // apply anti-FOMO penalty

  // Volatility estimate for dynamic TP/SL
  const volatility = Math.abs(token.change5m) + Math.abs(token.change1h / 12);

  return {
    rsi: Math.round(rsi),
    buyPressure: (buyPressure * 100).toFixed(0),
    momentum5m, momentum1h, momentum24h,
    liqScore,
    volAccel,
    confidence,
    volatility,
    composite,
    strength: composite > 0.6 ? 'strong' : composite > 0.3 ? 'medium' : 'weak',
    isRugRisk,
    alreadyPumped
  };
}

// ============================================================
// JUPITER — REAL SWAP QUOTES
// ============================================================
async function getJupiterQuote(inputMint, outputMint, amountLamports) {
  try {
    const url = `${JUPITER_QUOTE_API}/quote?inputMint=${inputMint}&outputMint=${outputMint}&amount=${amountLamports}&slippageBps=${S.settings.slippage * 10}`;
    const resp = await fetch(url);
    const data = await resp.json();
    return data;
  } catch(e) {
    console.error('Jupiter quote error:', e);
    return null;
  }
}

async function executeJupiterSwap(quoteResponse) {
  if (!S.walletConnected || !window.solana) {
    notify('Wallet non connecté', 'loss');
    return false;
  }
  try {
    const resp = await fetch(`${JUPITER_QUOTE_API}/swap`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        quoteResponse,
        userPublicKey: S.walletAddress,
        wrapAndUnwrapSol: true
      })
    });
    const swapData = await resp.json();
    if (!swapData.swapTransaction || swapData.error) {
      notify('Erreur Jupiter: ' + (swapData.error || 'Pas de transaction reçue'), 'loss');
      return false;
    }
    const swapTransaction = swapData.swapTransaction;

    // Deserialize and sign with Phantom
    let txBuf;
    try {
      txBuf = Uint8Array.from(atob(swapTransaction), c => c.charCodeAt(0));
    } catch(decErr) {
      notify('Erreur décodage transaction', 'loss');
      return false;
    }
    const tx = window.solanaWeb3
      ? window.solanaWeb3.VersionedTransaction.deserialize(txBuf)
      : null;

    if (!tx) {
      notify('Erreur: solana-web3.js non disponible', 'loss');
      return false;
    }

    const signed = await window.solana.signTransaction(tx);
    const conn = new window.solanaWeb3.Connection('https://api.mainnet-beta.solana.com');
    const txid = await conn.sendRawTransaction(signed.serialize());
    await conn.confirmTransaction(txid, 'confirmed');

    notify(`Transaction confirmée: ${txid.slice(0,8)}...`, 'win');
    return txid;
  } catch(e) {
    notify('Erreur swap: ' + e.message, 'loss');
    return false;
  }
}

// ============================================================
// TRADING ENGINE
// ============================================================
function calcSlippage(liquidity) {
  if (liquidity > 100000) return 0.5;
  if (liquidity > 50000) return 1.0;
  if (liquidity > 20000) return 1.5;
  if (liquidity > 10000) return 2.0;
  return 3.0;
}

async function proposeTrade(token) {
  const maxPos = S.maxPositions || 5;
  if (S.positions.length >= maxPos) { notify(`Maximum ${maxPos} positions simultanées`, 'info'); return; }
  if (S.positions.find(p => p.token === token.name)) { notify(`Position déjà ouverte sur ${token.name}`, 'info'); return; }

  // Cooldown: avoid re-entering a token we recently lost on
  const recentLoss = S.history.find(h => h.token === token.name && h.pnlPercent < 0 && (Date.now() - h.timestamp) < 120000);
  if (recentLoss) { addLog('⏳', `Cooldown actif pour ${token.name} après perte récente`); return; }

  // Use adaptive position size if available, otherwise settings
  const posPct = (S.adaptivePosSize || S.settings.posSize) / 100;
  const signals = token.signals;

  // Available capital: use tradeable balance (minus fee reserve)
  const available = S.tradeableBalance || S.portfolio;
  if (available <= 0) { notify('Solde insuffisant pour trader', 'loss'); return; }

  // Confidence-based position sizing: stronger signals = larger position
  const confidenceMultiplier = 0.5 + (signals.confidence * 0.5); // 0.5x to 1.0x
  const compositeBonus = Math.max(0, (signals.composite - 0.6) * 0.5); // extra for very strong signals
  const sizeFactor = Math.min(1.0, confidenceMultiplier + compositeBonus);
  let posSize = available * posPct * sizeFactor;

  // Cap to available balance (never exceed what we have)
  posSize = Math.min(posSize, available * 0.95);

  // Minimum position size guard (adaptive to wallet size)
  const minPos = S.minPosSize || 0.1;
  if (posSize < minPos) {
    if (available < minPos * 1.5) {
      notify('Solde trop bas pour ouvrir une position', 'info');
    }
    return;
  }

  const slippage = calcSlippage(token.liquidity);

  // Dynamic TP/SL based on volatility and signal confidence
  const vol = signals.volatility || 5;
  const baseTP = S.settings.tp;
  const baseSL = S.settings.sl;
  // High volatility = wider TP/SL, high confidence = tighter SL
  const dynamicTP = Math.max(baseTP, baseTP * (1 + vol * 0.04));
  const dynamicSL = Math.max(baseSL * 0.7, baseSL * (1 - signals.confidence * 0.25 + vol * 0.02));

  const trade = {
    token: token.name,
    pair: token.pair,
    address: token.address,
    quoteAddress: token.quoteAddress,
    entryPrice: token.price,
    size: posSize,
    slippage,
    signals: { ...signals },
    liquidity: token.liquidity,
    volume: token.volume,
    dynamicTP,
    dynamicSL
  };

  if (S.mode === 'demo') {
    // Demo: execute immediately (simulated)
    executeDemoTrade(trade);
  } else if (S.mode === 'semi') {
    // Semi-auto: show confirmation modal
    pendingTrade = trade;
    showTradeModal(trade);
  } else if (S.mode === 'auto' && S.walletConnected) {
    // Auto: get real Jupiter quote and execute
    await executeRealTrade(trade);
  }
}

function executeDemoTrade(trade) {
  const entryWithSlippage = trade.entryPrice * (1 + trade.slippage / 100);
  const pos = {
    id: Date.now(),
    token: trade.token,
    pair: trade.pair,
    address: trade.address,
    entryPrice: entryWithSlippage,
    currentPrice: entryWithSlippage,
    previousPrice: entryWithSlippage,
    size: trade.size,
    solAmount: trade.size,
    entryTime: Date.now(),
    slippage: trade.slippage,
    signals: trade.signals,
    tp1: trade.dynamicTP || S.settings.tp,
    sl: trade.dynamicSL || S.settings.sl,
    mode: 'demo',
    // Trailing stop state
    highestPrice: entryWithSlippage,
    trailingActive: false,
    partialTaken: 0 // 0=none, 1=TP1 taken, 2=TP2 taken
  };

  S.positions.push(pos);
  S.portfolio -= trade.size;
  notify(`⚔ Entrée ${S.mode === 'demo' ? '(Démo)' : ''}: ${trade.token} — ${fmt(trade.size)} SOL`, 'info');
  addLog('⚔', `Position ouverte: ${trade.token} à $${trade.entryPrice.toFixed(6)} — ${fmt(trade.size)} SOL, slippage: ${trade.slippage}%`);
  saveState();
  renderAll();
}

async function executeRealTrade(trade) {
  // Get Jupiter quote
  const amountLamports = Math.floor(trade.size * LAMPORTS);
  notify(`Obtention du prix Jupiter pour ${trade.token}...`, 'info');

  const quote = await getJupiterQuote(SOL_MINT, trade.address, amountLamports);
  if (!quote || quote.error) {
    notify('Impossible d\'obtenir un prix. Token peut-être illiquide.', 'loss');
    return;
  }

  const outAmount = parseInt(quote.outAmount);
  if (!outAmount || outAmount <= 0) {
    notify('Quote invalide: montant de sortie nulle', 'loss');
    return;
  }
  const priceImpact = parseFloat(quote.priceImpactPct || 0);

  if (priceImpact > 3) {
    notify(`Impact prix trop élevé: ${priceImpact.toFixed(2)}% — trade annulé`, 'loss');
    addLog('⚠', `Trade ${trade.token} annulé: impact prix ${priceImpact.toFixed(2)}%`);
    return;
  }

  if (S.mode === 'semi') {
    pendingTrade = { ...trade, quote, outAmount, priceImpact };
    showTradeModal(pendingTrade);
    return;
  }

  // Auto mode: execute
  const txid = await executeJupiterSwap(quote);
  if (txid) {
    const pos = {
      id: Date.now(), token: trade.token, pair: trade.pair,
      address: trade.address, entryPrice: trade.entryPrice,
      currentPrice: trade.entryPrice, size: trade.size,
      solAmount: trade.size, entryTime: Date.now(),
      slippage: trade.slippage, signals: trade.signals,
      tp1: S.settings.tp, sl: S.settings.sl,
      mode: 'live', txid
    };
    S.positions.push(pos);
    S.portfolio -= trade.size;
    addLog('✅', `Trade réel exécuté: ${trade.token} — TX: ${txid.slice(0,12)}...`);
    saveState();
    renderAll();
  }
}

function confirmPendingTrade() {
  if (!pendingTrade) return;
  closeModal();

  if (pendingTrade.quote && S.walletConnected) {
    executeJupiterSwap(pendingTrade.quote).then(txid => {
      if (txid) {
        const t = pendingTrade;
        const learnTP = (S.learn && S.learn.dynamicTP) || t.dynamicTP || S.settings.tp;
        const learnSL = (S.learn && S.learn.dynamicSL) || t.dynamicSL || S.settings.sl;
        const entrySlip = t.entryPrice * (1 + t.slippage / 100);
        const pos = {
          id: Date.now(), token: t.token, pair: t.pair, address: t.address,
          entryPrice: entrySlip, currentPrice: entrySlip, previousPrice: entrySlip,
          size: t.size, solAmount: t.size, entryTime: Date.now(),
          slippage: t.slippage, signals: t.signals,
          tp1: learnTP, sl: learnSL,
          mode: 'live', txid,
          highestPrice: entrySlip, trailingActive: false, partialTaken: 0
        };
        S.positions.push(pos);
        S.portfolio -= t.size;
        addLog('✅', `Trade confirmé: ${t.token} — TX: ${txid.slice(0,12)}...`);
        saveState();
        renderAll();
      }
      pendingTrade = null;
    });
  } else {
    // Demo mode
    executeDemoTrade(pendingTrade);
    pendingTrade = null;
  }
}

function cancelPendingTrade() {
  pendingTrade = null;
  closeModal();
  notify('Trade annulé', 'info');
}

// Update positions with real or simulated prices
async function updatePositions() {
  if (!S.positions.length) return;

  const toClose = [];
  const toPartial = [];

  for (const pos of S.positions) {
    if (pos.mode === 'demo') {
      // Neutral random walk — no bias from signal strength (realistic simulation)
      const tokenVol = (pos.signals.volatility || 5) * 0.003;
      const vol = (Math.random() - 0.5) * Math.max(0.02, tokenVol);
      pos.currentPrice *= (1 + vol);
    } else {
      // Live: try fetch real price
      try {
        const r = await fetch(`${DEXSCREENER_API}/tokens/${pos.address}`);
        const d = await r.json();
        if (d.pairs?.[0]?.priceUsd) {
          const newPrice = parseFloat(d.pairs[0].priceUsd);
          if (!isNaN(newPrice) && newPrice > 0) pos.currentPrice = newPrice;
        }
      } catch(e) {}
    }

    if (!pos.entryPrice || pos.entryPrice <= 0) continue;
    const pnl = ((pos.currentPrice - pos.entryPrice) / pos.entryPrice) * 100;
    const holdTime = Date.now() - pos.entryTime;
    const holdMinutes = holdTime / 60000;

    // Update highest price for trailing stop
    if (!pos.highestPrice || pos.currentPrice > pos.highestPrice) {
      pos.highestPrice = pos.currentPrice;
    }

    // Trailing stop: activate after reaching TP1 threshold
    const tp1Thresh = pos.tp1;
    const tp2Thresh = pos.tp1 * 2;
    const tp3Thresh = pos.tp1 * 3.3;
    const highPnl = ((pos.highestPrice - pos.entryPrice) / pos.entryPrice) * 100;

    // --- Tiered exit logic ---

    // TP3: hard take profit at 3.3x TP
    if (pnl >= tp3Thresh) {
      toClose.push({ pos, reason: 'TP3', pnl });
    }
    // TP2: partial or trailing — take 50% at TP2, let rest ride with trailing
    else if (pnl >= tp2Thresh && (pos.partialTaken || 0) < 2) {
      pos.partialTaken = 2;
      pos.trailingActive = true;
      // Take 50% of remaining position as profit
      const partialSol = pos.solAmount * 0.5;
      const partialPnl = partialSol * (pnl / 100);
      S.portfolio += partialSol + partialPnl;
      pos.solAmount -= partialSol;
      pos.size = pos.solAmount;
      notify(`📊 TP2 partiel: ${pos.token} +${pnl.toFixed(1)}% — 50% sécurisé`, 'win');
      addLog('📊', `Prise de profit partielle TP2: ${pos.token} +${pnl.toFixed(1)}%`);
    }
    // TP1: take 30% profit, activate trailing stop
    else if (pnl >= tp1Thresh && (pos.partialTaken || 0) < 1) {
      pos.partialTaken = 1;
      pos.trailingActive = true;
      const partialSol = pos.solAmount * 0.3;
      const partialPnl = partialSol * (pnl / 100);
      S.portfolio += partialSol + partialPnl;
      pos.solAmount -= partialSol;
      pos.size = pos.solAmount;
      // Move stop loss to small buffer above breakeven (protects capital without instant close)
      pos.sl = 2;
      notify(`📊 TP1 partiel: ${pos.token} +${pnl.toFixed(1)}% — 30% sécurisé, SL → breakeven`, 'win');
      addLog('📊', `Prise de profit TP1: ${pos.token} +${pnl.toFixed(1)}%, SL déplacé à breakeven`);
    }
    // Trailing stop: if price dropped significantly from peak after TP1
    else if (pos.trailingActive && highPnl > tp1Thresh) {
      const drawdown = highPnl - pnl;
      // Trail at 40% of gains — if you gained 30% and dropped 12% from peak, close
      const trailThreshold = highPnl * 0.4;
      if (drawdown > trailThreshold && drawdown > 5) {
        toClose.push({ pos, reason: 'Trail', pnl });
      }
    }
    // Hard stop loss
    else if (pnl <= -pos.sl) {
      toClose.push({ pos, reason: 'SL', pnl });
    }
    // Time-based stagnation exit: if position hasn't moved much after 10+ minutes
    else if (holdMinutes > 10 && Math.abs(pnl) < 2 && !pos.trailingActive) {
      // Stagnating — free up capital for better opportunities
      if (Math.random() > 0.7) {
        toClose.push({ pos, reason: 'Stagnation', pnl });
      }
    }
    // Emergency exit: rapid dump detection (>15% drop in single tick)
    else if (pnl < -pos.sl * 0.6 && pos.currentPrice < (pos.previousPrice || pos.currentPrice) * 0.96) {
      toClose.push({ pos, reason: 'Dump détecté', pnl });
    }

    // Store previous price for dump detection
    pos.previousPrice = pos.currentPrice;
  }

  for (const { pos, reason, pnl } of toClose) await closeTrade(pos, reason, pnl);
  renderPositions();
  updateDashboard();
}

async function closeTrade(pos, reason, pnlPct) {
  const pnlSol = pos.solAmount * (pnlPct / 100);
  const returnAmt = pos.solAmount + pnlSol;

  if (pos.mode === 'live' && S.walletConnected && pos.address) {
    notify(`Fermeture réelle de ${pos.token}...`, 'info');
    try {
      // Estimate token balance from position size and price change
      const estTokenLamports = Math.floor(pos.solAmount * LAMPORTS * (pos.entryPrice / (pos.currentPrice || pos.entryPrice)));
      const closeQuote = await getJupiterQuote(pos.address, SOL_MINT, estTokenLamports);
      if (closeQuote && !closeQuote.error) {
        const closeTxid = await executeJupiterSwap(closeQuote);
        if (closeTxid) {
          addLog('\u2705', `Swap retour exécuté: ${pos.token} → SOL — TX: ${closeTxid.slice(0,12)}...`);
          // Use real return amount from Jupiter instead of simulated PnL
          const realReturn = parseInt(closeQuote.outAmount) / LAMPORTS;
          if (realReturn > 0) {
            S.portfolio += realReturn;
            // Skip the default portfolio credit below
            const record = {
              token: pos.token, entryPrice: pos.entryPrice, exitPrice: pos.currentPrice,
              pnlPercent: ((realReturn - pos.solAmount) / pos.solAmount) * 100,
              pnlSol: realReturn - pos.solAmount, reason,
              duration: Date.now() - pos.entryTime,
              signals: pos.signals, timestamp: Date.now(), mode: pos.mode
            };
            S.history.unshift(record);
            S.totalTrades++;
            if (record.pnlPercent > 0) { S.wins++; gainXP(Math.floor(20 + record.pnlPercent * 3)); notify(`\u2705 ${pos.token}: +${record.pnlPercent.toFixed(2)}%`, 'win'); }
            else { S.losses++; gainXP(10); notify(`\u274c ${pos.token}: ${record.pnlPercent.toFixed(2)}%`, 'loss'); }
            if (record.pnlPercent > S.bestTrade) S.bestTrade = record.pnlPercent;
            if (record.pnlPercent < S.worstTrade) S.worstTrade = record.pnlPercent;
            S.positions = S.positions.filter(p => p.id !== pos.id);
            adaptWeights(record);
            updateHistory();
            saveState();
            return; // Skip the default close logic below
          }
        } else {
          notify(`Swap retour échoué pour ${pos.token} — fermeture manuelle requise`, 'loss');
          addLog('\u26a0', `Impossible de vendre ${pos.token} automatiquement`);
        }
      } else {
        notify(`Pas de quote pour vendre ${pos.token} — vérifiez manuellement`, 'loss');
      }
    } catch(closeErr) {
      notify(`Erreur fermeture ${pos.token}: ${closeErr.message}`, 'loss');
      addLog('\u274c', `Erreur swap retour ${pos.token}: ${closeErr.message}`);
    }
  }

  S.portfolio += returnAmt;
  const record = {
    token: pos.token, entryPrice: pos.entryPrice, exitPrice: pos.currentPrice,
    pnlPercent: pnlPct, pnlSol, reason,
    duration: Date.now() - pos.entryTime,
    signals: pos.signals, timestamp: Date.now(), mode: pos.mode
  };

  S.history.unshift(record);
  S.totalTrades++;
  if (pnlPct > 0) { S.wins++; gainXP(Math.floor(20 + pnlPct * 3)); notify(`✅ ${pos.token}: +${pnlPct.toFixed(2)}% (+${pnlSol.toFixed(4)} SOL)`, 'win'); }
  else { S.losses++; gainXP(10); notify(`❌ ${pos.token}: ${pnlPct.toFixed(2)}% (${pnlSol.toFixed(4)} SOL)`, 'loss'); }
  if (pnlPct > S.bestTrade) S.bestTrade = pnlPct;
  if (pnlPct < S.worstTrade) S.worstTrade = pnlPct;

  S.positions = S.positions.filter(p => p.id !== pos.id);
  adaptWeights(record);
  updateHistory();
  saveState();
}

function closePositionManual(id) {
  const pos = S.positions.find(p => p.id === id);
  if (!pos) return;
  const pnl = ((pos.currentPrice - pos.entryPrice) / pos.entryPrice) * 100;
  closeTrade(pos, 'Manuel', pnl);
  renderAll();
}

// ADAPTIVE LEARNING — DEEP ENGINE

// Continuous learning state (persisted via S)
function ensureLearningState() {
  if (!S.learn) S.learn = {
    entryPatterns: [],       // successful entry signal snapshots
    exitPatterns: [],        // exit reason effectiveness
    slippageLog: [],         // slippage accuracy tracking
    tpHitRate: { tp1: 0, tp2: 0, tp3: 0, trail: 0, sl: 0, stag: 0, dump: 0, manual: 0 },
    avgHoldWin: 0,           // avg hold time for wins
    avgHoldLoss: 0,          // avg hold time for losses
    optimalComposite: 0.6,   // learned optimal entry composite threshold
    optimalConfidence: 0.5,  // learned optimal confidence threshold
    rsiZonePerf: { low: { w: 0, l: 0 }, mid: { w: 0, l: 0 }, high: { w: 0, l: 0 } },
    volZonePerf: { low: { w: 0, l: 0 }, mid: { w: 0, l: 0 }, high: { w: 0, l: 0 } },
    trendPerf: { aligned: { w: 0, l: 0 }, partial: { w: 0, l: 0 }, against: { w: 0, l: 0 } },
    liqPerf: { low: { w: 0, l: 0 }, mid: { w: 0, l: 0 }, high: { w: 0, l: 0 } },
    dynamicTP: S.settings.tp,
    dynamicSL: S.settings.sl,
    cycleCount: 0
  };
}

function adaptWeights(trade) {
  ensureLearningState();
  const L = S.learn;
  const sig = trade.signals || {};
  const isWin = trade.pnlPercent > 0;
  const magnitude = Math.min(Math.abs(trade.pnlPercent) / 20, 1);
  const direction = isWin ? 1 : -1;
  const boost = direction * 0.04 * (1 + magnitude);

  // 1. Signal weight adaptation
  if (sig.rsi < 35 || sig.rsi > 65) S.signalWeights.rsi = clamp(S.signalWeights.rsi + boost, 0.3, 2.5);
  if (parseFloat(sig.buyPressure) > 55 || parseFloat(sig.buyPressure) < 40)
    S.signalWeights.volume = clamp(S.signalWeights.volume + boost, 0.3, 2.5);
  S.signalWeights.ema = clamp(S.signalWeights.ema + boost * 0.8, 0.3, 2.5);
  S.signalWeights.liquidity = clamp(S.signalWeights.liquidity + boost * 0.5, 0.3, 2.5);

  // 2. RSI zone performance tracking
  const rsiZone = sig.rsi < 35 ? 'low' : sig.rsi > 65 ? 'high' : 'mid';
  if (isWin) L.rsiZonePerf[rsiZone].w++; else L.rsiZonePerf[rsiZone].l++;

  // 3. Volume zone performance
  const bp = parseFloat(sig.buyPressure) || 50;
  const volZone = bp > 60 ? 'high' : bp > 45 ? 'mid' : 'low';
  if (isWin) L.volZonePerf[volZone].w++; else L.volZonePerf[volZone].l++;

  // 4. Trend alignment performance
  const trendZone = (sig.momentum5m > 0 && sig.momentum1h > 0) ? 'aligned' :
    (sig.momentum5m > 0 || sig.momentum1h > 0) ? 'partial' : 'against';
  if (isWin) L.trendPerf[trendZone].w++; else L.trendPerf[trendZone].l++;

  // 5. Liquidity zone performance
  const liqZone = (sig.liqScore || 0) > 0.7 ? 'high' : (sig.liqScore || 0) > 0.35 ? 'mid' : 'low';
  if (isWin) L.liqPerf[liqZone].w++; else L.liqPerf[liqZone].l++;

  // 6. Exit reason tracking
  const reason = trade.reason || 'unknown';
  const reasonKey = reason === 'TP3' ? 'tp3' : reason === 'TP2' ? 'tp2' : reason === 'TP1' ? 'tp1' :
    reason === 'Trail' ? 'trail' : reason === 'SL' ? 'sl' :
    reason === 'Stagnation' ? 'stag' : reason.includes('Dump') ? 'dump' : 'manual';
  L.tpHitRate[reasonKey] = (L.tpHitRate[reasonKey] || 0) + 1;

  // 7. Hold time learning
  const holdMs = trade.duration || 0;
  if (isWin) {
    L.avgHoldWin = L.avgHoldWin ? L.avgHoldWin * 0.8 + holdMs * 0.2 : holdMs;
  } else {
    L.avgHoldLoss = L.avgHoldLoss ? L.avgHoldLoss * 0.8 + holdMs * 0.2 : holdMs;
  }

  // 8. Entry pattern memory (last 30 winning patterns)
  if (isWin && trade.pnlPercent > 5) {
    L.entryPatterns.push({
      rsi: sig.rsi, bp, composite: sig.composite, confidence: sig.confidence,
      momentum5m: sig.momentum5m, momentum1h: sig.momentum1h, liqScore: sig.liqScore
    });
    if (L.entryPatterns.length > 30) L.entryPatterns.shift();
  }

  // 9. Dynamic TP/SL auto-tuning every 3 trades
  if (S.totalTrades > 0 && S.totalTrades % 3 === 0) {
    autoTuneTPSL();
  }

  // 10. Optimal threshold learning every 5 trades
  if (S.totalTrades > 4 && S.totalTrades % 5 === 0) {
    autoTuneThresholds();
    const wr = S.wins / S.totalTrades;
    const best = Object.entries(S.signalWeights).sort((a,b) => b[1]-a[1])[0];
    const names = { rsi:'RSI', volume:'Volume', ema:'Momentum', liquidity:'Liquidité' };
    addLog('🧠', `Analyse #${S.totalTrades}: WR ${(wr*100).toFixed(0)}% | Signal dominant: ${names[best[0]]} (${best[1].toFixed(2)}) | Seuil composite: ${L.optimalComposite.toFixed(2)} | TP: ${L.dynamicTP.toFixed(1)}% SL: ${L.dynamicSL.toFixed(1)}%`);
  }

  // Reason-based logs
  if (reason === 'SL' || reason.includes('Dump')) {
    addLog('🧠', `Perte ${trade.token} (${reason}) — renforcement filtres anti-perte`);
  } else if (reason === 'Trail' || reason === 'TP3') {
    addLog('🧠', `Sortie optimale ${trade.token} (${reason} +${trade.pnlPercent.toFixed(1)}%) — pattern enregistré`);
  } else if (reason === 'Stagnation') {
    addLog('🧠', `Stagnation ${trade.token} — réallocation du capital`);
  }

  checkAchieve('Premier Trio', '🎯', '3 trades exécutés', S.totalTrades >= 3);
  checkAchieve('Série Gagnante', '🔥', '5 trades gagnants', S.wins >= 5);
  checkAchieve('Rug Évité', '🛡', 'Rug pull détecté et évité', S.rugAvoided >= 1);
  checkAchieve('Vétéran', '⚔', '20 trades complétés', S.totalTrades >= 20);
  checkAchieve('Centurion', '🏛', '100 trades complétés', S.totalTrades >= 100);
  checkAchieve('x1.5 Capital', '💰', 'Portfolio à 150%', S.portfolio > S.startingPortfolio * 1.5);
  checkAchieve('x2 Capital', '👑', 'Portfolio doublé', S.portfolio > S.startingPortfolio * 2);
}

function autoTuneTPSL() {
  ensureLearningState();
  const L = S.learn;
  const recent = S.history.slice(0, Math.min(50, S.history.length));
  if (recent.length < 5) return;

  const wins = recent.filter(h => h.pnlPercent > 0);
  const losses = recent.filter(h => h.pnlPercent < 0);

  // If too many SL hits, widen SL slightly
  const slHits = recent.filter(h => h.reason === 'SL').length;
  if (slHits > recent.length * 0.5) {
    L.dynamicSL = clamp(L.dynamicSL + 0.5, 5, 15);
    addLog('⚙', `Auto-ajustement: SL élargi à ${L.dynamicSL.toFixed(1)}% (trop de stops)`);
  } else if (slHits < recent.length * 0.15 && losses.length > 0) {
    L.dynamicSL = clamp(L.dynamicSL - 0.3, 5, 15);
  }

  // If wins average is high, raise TP to let profits run
  if (wins.length > 0) {
    const avgWinPnl = wins.reduce((s, h) => s + h.pnlPercent, 0) / wins.length;
    if (avgWinPnl > L.dynamicTP * 1.5) {
      L.dynamicTP = clamp(L.dynamicTP + 1, 10, 60);
      addLog('⚙', `Auto-ajustement: TP relevé à ${L.dynamicTP.toFixed(1)}% (profits élevés)`);
    } else if (avgWinPnl < L.dynamicTP * 0.5 && wins.length < recent.length * 0.3) {
      L.dynamicTP = clamp(L.dynamicTP - 0.5, 10, 60);
    }
  }
}

function autoTuneThresholds() {
  ensureLearningState();
  const L = S.learn;
  const recent = S.history.slice(0, 20);
  if (recent.length < 5) return;

  // Find composite values that led to wins vs losses
  const winComps = recent.filter(h => h.pnlPercent > 0 && h.signals?.composite).map(h => h.signals.composite);
  const lossComps = recent.filter(h => h.pnlPercent < 0 && h.signals?.composite).map(h => h.signals.composite);

  if (winComps.length > 0) {
    const avgWinComp = winComps.reduce((a, b) => a + b, 0) / winComps.length;
    const avgLossComp = lossComps.length > 0 ? lossComps.reduce((a, b) => a + b, 0) / lossComps.length : 0;
    // Set threshold between avg loss and avg win composite
    const newThresh = (avgWinComp + avgLossComp) / 2;
    L.optimalComposite = clamp(L.optimalComposite * 0.7 + newThresh * 0.3, 0.35, 0.85);
  }

  const winConfs = recent.filter(h => h.pnlPercent > 0 && h.signals?.confidence).map(h => h.signals.confidence);
  if (winConfs.length > 0) {
    const avgConf = winConfs.reduce((a, b) => a + b, 0) / winConfs.length;
    L.optimalConfidence = clamp(L.optimalConfidence * 0.7 + (avgConf * 0.8) * 0.3, 0.3, 0.8);
  }

  // Pattern matching: boost weights of zones with best win rate
  const zones = [
    { perf: L.rsiZonePerf, weight: 'rsi', name: 'RSI' },
    { perf: L.volZonePerf, weight: 'volume', name: 'Volume' },
    { perf: L.trendPerf, weight: 'ema', name: 'Momentum' },
    { perf: L.liqPerf, weight: 'liquidity', name: 'Liquidité' }
  ];
  for (const z of zones) {
    let totalW = 0, totalL = 0;
    Object.values(z.perf).forEach(v => { totalW += v.w; totalL += v.l; });
    if (totalW + totalL > 5) {
      const zoneWR = totalW / (totalW + totalL);
      if (zoneWR > 0.6) S.signalWeights[z.weight] = clamp(S.signalWeights[z.weight] + 0.05, 0.3, 2.5);
      else if (zoneWR < 0.35) S.signalWeights[z.weight] = clamp(S.signalWeights[z.weight] - 0.05, 0.3, 2.5);
    }
  }
}

// Continuous micro-learning: runs every cycle to refine parameters
function continuousLearn() {
  ensureLearningState();
  const L = S.learn;
  L.cycleCount++;

  // Every 10 cycles (~25s): re-score all scanner tokens with latest weights
  if (L.cycleCount % 10 === 0 && S.scannerTokens.length > 0) {
    S.scannerTokens.forEach(t => { t.signals = computeRealSignals(t); });
    S.scannerTokens.sort((a, b) => b.signals.composite - a.signals.composite);
    renderTokens();
  }

  // Every 20 cycles (~50s): analyze position health + sync wallet balance
  if (L.cycleCount % 20 === 0) {
    // Sync real wallet balance if connected
    if (S.walletConnected) {
      fetchWalletBalance().catch(() => {});
    }
    // Also run adaptToBalance in demo mode (adapts to current portfolio value)
    if (!S.walletConnected) {
      S.tradeableBalance = Math.max(0, S.portfolio - 0.015);
      adaptToBalance();
    }

    if (S.positions.length > 0) {
    for (const pos of S.positions) {
      const pnl = ((pos.currentPrice - pos.entryPrice) / pos.entryPrice) * 100;
      const holdMin = (Date.now() - pos.entryTime) / 60000;
      // If learned avg loss hold time exists, warn about positions held too long in red
      if (pnl < 0 && L.avgHoldLoss > 0 && (Date.now() - pos.entryTime) > L.avgHoldLoss * 1.5) {
        addLog('⚠', `${pos.token} en perte depuis trop longtemps (${holdMin.toFixed(0)}min) — surveillance renforcée`);
      }
      }
    }
  }

  // Every 40 cycles (~100s): pattern match current market against winning patterns
  if (L.cycleCount % 40 === 0 && L.entryPatterns.length >= 3) {
    const avgPattern = {
      rsi: L.entryPatterns.reduce((s, p) => s + p.rsi, 0) / L.entryPatterns.length,
      bp: L.entryPatterns.reduce((s, p) => s + p.bp, 0) / L.entryPatterns.length,
      composite: L.entryPatterns.reduce((s, p) => s + p.composite, 0) / L.entryPatterns.length
    };
    addLog('📊', `Pattern gagnant moyen: RSI ${avgPattern.rsi.toFixed(0)}, Buy% ${avgPattern.bp.toFixed(0)}%, Score ${avgPattern.composite.toFixed(2)}`);
  }

  saveState();
}

function checkAchieve(name, icon, desc, condition) {
  if (!condition || S.achievements.find(a => a.name === name)) return;
  S.achievements.push({ name, icon, desc, time: Date.now() });
  notify(`🏆 Succès: ${name}`, 'info');
  renderAchievements();
}

function clamp(v, min, max) { return Math.max(min, Math.min(max, v)); }

// ============================================================
// XP & LEVELS
// ============================================================
function gainXP(amt) {
  S.xp += amt;
  let needed = xpFor(S.level + 1);
  while (S.xp >= needed) { S.xp -= needed; S.level++; onLevelUp(); needed = xpFor(S.level + 1); }
  updateXP();
}

function xpFor(lvl) { return Math.floor(100 * Math.pow(1.4, lvl - 1)); }

function onLevelUp() {
  notify(`⭐ NIVEAU ${S.level} ATTEINT!`, 'info');
  addLog('⭐', `Montée au Niveau ${S.level}! Capacités améliorées.`);
  const flash = document.createElement('div');
  flash.style.cssText = 'position:fixed;inset:0;background:radial-gradient(circle,rgba(212,165,66,.2),transparent 70%);pointer-events:none;z-index:999;animation:fadeIn .3s ease,nFade .5s ease 1s forwards';
  document.body.appendChild(flash);
  setTimeout(() => flash.remove(), 1600);
  updatePerks();
}

// ============================================================
// AUTO-SCAN LOOP — TURBO 2.5s
// ============================================================
function startEngine() {
  ensureLearningState();

  // Fetch SOL/USD price immediately and every 20s
  fetchSolPrice();
  intervals.solPrice = setInterval(() => fetchSolPrice(), 20000);

  // Scan DexScreener every 8s (fast refresh)
  fetchDexScreenerTokens();
  intervals.scan = setInterval(() => fetchDexScreenerTokens(), 8000);

  // === MASTER LOOP: 2.5s turbo cycle ===
  let tick = 0;
  let isUpdating = false;
  engineRunning = true;
  intervals.master = setInterval(async () => {
    if (isUpdating || !engineRunning) return; // skip if still processing
    isUpdating = true;
    try {
      tick++;
      const L = S.learn || {};

      // Every tick (2.5s): update positions + continuous learning
      await updatePositions();
      continuousLearn();

    // Every 3rd tick (7.5s): evaluate trade candidates
    if (tick % 3 === 0 && (S.mode === 'demo' || S.mode === 'auto')) {
      const compositeThresh = L.optimalComposite || 0.6;
      const confThresh = L.optimalConfidence || 0.5;

      const candidates = S.scannerTokens.filter(t =>
        t.signals.strength === 'strong' &&
        !t.signals.isRugRisk &&
        !t.signals.alreadyPumped &&
        t.signals.composite >= compositeThresh &&
        t.signals.confidence >= confThresh &&
        t.liquidity >= 10000 &&
        t.volume >= 5000 &&
        t.pairAge >= 1 &&
        !S.positions.find(p => p.token === t.name)
      );
      candidates.sort((a, b) => {
        // Score: composite * confidence * liquidity factor
        const scoreA = a.signals.composite * a.signals.confidence * Math.min(1, a.liquidity / 50000);
        const scoreB = b.signals.composite * b.signals.confidence * Math.min(1, b.liquidity / 50000);
        return scoreB - scoreA;
      });

      if (candidates.length && S.positions.length < (S.maxPositions || 5)) {
        const best = candidates[0];
        if (best.signals.isRugRisk && S.level >= 3) {
          S.rugAvoided++;
          addLog('🔍', `Rug potentiel détecté sur ${best.name} — évité!`);
        } else {
          // Use learned TP/SL if available
          if (L.dynamicTP) S.settings.tp = L.dynamicTP;
          if (L.dynamicSL) S.settings.sl = L.dynamicSL;
          proposeTrade(best);
        }
      }
    }

    // Every 4th tick (10s): snapshot portfolio
    if (tick % 4 === 0) {
      const total = getTotalPortfolio();
      if (S.portfolioHistory.length === 0 || Math.abs(total - S.portfolioHistory[S.portfolioHistory.length-1]) > 0.001) {
        S.portfolioHistory.push(parseFloat(total.toFixed(4)));
        S.timeLabels.push(timeNow());
        if (S.portfolioHistory.length > 120) { S.portfolioHistory.shift(); S.timeLabels.shift(); }
        updateChart();
      }
      saveState();
    }

    } finally { isUpdating = false; }
  }, 2500);
}

function stopEngine() {
  engineRunning = false;

function getTotalPortfolio() {
  return S.portfolio + S.positions.reduce((s, p) => {
    const pnl = (p.currentPrice - p.entryPrice) / p.entryPrice;
    return s + p.solAmount * (1 + pnl);
  }, 0);
}

function updateBotAge() {
  const created = S.botCreatedAt || Date.now();
  const ageMs = Date.now() - created;
  const ageMin = ageMs / 60000;
  const ageH = ageMs / 3600000;
  const ageD = ageMs / 86400000;

  // Age stages with titles and bar %
  // 0-1h: Nouveau-né (0-5%), 1-6h: Apprenti (5-15%), 6-24h: Recrue (15-30%)
  // 1-3j: Soldat (30-50%), 3-7j: Vétéran (50-70%), 7-14j: Élite (70-85%)
  // 14-30j: Maître (85-95%), 30j+: Légende (95-100%)
  let title, pct, color;
  if (ageH < 1) {
    title = 'Nouveau-né'; pct = Math.min(5, (ageMin / 60) * 5);
    color = 'linear-gradient(90deg, #9b59b6, #8e44ad)';
  } else if (ageH < 6) {
    title = 'Apprenti'; pct = 5 + ((ageH - 1) / 5) * 10;
    color = 'linear-gradient(90deg, #3498db, #2980b9)';
  } else if (ageH < 24) {
    title = 'Recrue'; pct = 15 + ((ageH - 6) / 18) * 15;
    color = 'linear-gradient(90deg, #2ecc71, #27ae60)';
  } else if (ageD < 3) {
    title = 'Soldat'; pct = 30 + ((ageD - 1) / 2) * 20;
    color = 'linear-gradient(90deg, var(--gold), var(--amber))';
  } else if (ageD < 7) {
    title = 'Vétéran'; pct = 50 + ((ageD - 3) / 4) * 20;
    color = 'linear-gradient(90deg, #e67e22, #d35400)';
  } else if (ageD < 14) {
    title = 'Élite'; pct = 70 + ((ageD - 7) / 7) * 15;
    color = 'linear-gradient(90deg, #e74c3c, #c0392b)';
  } else if (ageD < 30) {
    title = 'Maître'; pct = 85 + ((ageD - 14) / 16) * 10;
    color = 'linear-gradient(90deg, #e74c3c, var(--gold))';
  } else {
    title = 'Légende'; pct = 95 + Math.min(5, (ageD - 30) / 60 * 5);
    color = 'linear-gradient(90deg, var(--gold), #fff5cc, var(--gold))';
  }

  // Add time display
  let timeStr;
  if (ageMin < 60) timeStr = Math.floor(ageMin) + 'min';
  else if (ageH < 24) timeStr = Math.floor(ageH) + 'h ' + Math.floor(ageMin % 60) + 'min';
  else timeStr = Math.floor(ageD) + 'j ' + Math.floor(ageH % 24) + 'h';

  const bar = document.getElementById('ageBar');
  const lbl = document.getElementById('ageLbl');
  if (bar) {
    bar.style.width = Math.min(100, pct).toFixed(1) + '%';
    bar.style.background = color;
  }
  if (lbl) lbl.textContent = title + ' — ' + timeStr;

  // Age-based achievements
  checkAchieve('Première Heure', '⏰', '1 heure de trading', ageH >= 1);
  checkAchieve('Journée Complète', '📅', '24h de fonctionnement', ageD >= 1);
  checkAchieve('Survivant', '🏕', '7 jours actif', ageD >= 7);
  checkAchieve('Légende Vivante', '🌟', '30 jours de service', ageD >= 30);
}

function initChart() {
  try {
    if (typeof Chart === 'undefined') { console.warn('Chart.js not loaded'); return; }
    const el = document.getElementById('portChart');
    if (!el) return;
    const ctx = el.getContext('2d');
    const grad = ctx.createLinearGradient(0,0,0,190);
  grad.addColorStop(0, 'rgba(212,165,66,.25)');
  grad.addColorStop(1, 'rgba(212,165,66,0)');

  chart = new Chart(ctx, {
    type: 'line',
    data: {
      labels: S.timeLabels,
      datasets: [{ data: S.portfolioHistory, borderColor: '#d4a542', backgroundColor: grad, borderWidth: 2, fill: true, tension: .4, pointRadius: 0, pointHoverRadius: 3 }]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: { legend: { display: false }, tooltip: { backgroundColor: 'rgba(22,27,58,.95)', titleColor: '#f0d68a', bodyColor: '#e8e0d0', borderColor: 'rgba(212,165,66,.3)', borderWidth: 1, displayColors: false } },
      scales: {
        x: { grid: { color: 'rgba(255,255,255,.02)' }, ticks: { color: 'rgba(255,255,255,.25)', font: { size: 9, family: 'JetBrains Mono' }, maxTicksLimit: 8 } },
        y: { grid: { color: 'rgba(255,255,255,.02)' }, ticks: { color: 'rgba(255,255,255,.25)', font: { size: 9, family: 'JetBrains Mono' } } }
      },
      interaction: { mode: 'nearest', axis: 'x', intersect: false }
    }
  });
  } catch(e) { console.warn('Chart init failed:', e); }
}

function updateChart() {
  if (!chart) return;
  chart.data.labels = S.timeLabels;
  chart.data.datasets[0].data = S.portfolioHistory;
  chart.update('none');
}

function setRisk(level) {
  document.querySelectorAll('.risk-btn').forEach(b => b.classList.remove('active'));
  document.querySelector(`[data-risk="${level}"]`).classList.add('active');
  S.settings.risk = level;
  const presets = { conservative:{posSize:8,slippage:10,tp:10,sl:5}, balanced:{posSize:15,slippage:15,tp:15,sl:8}, aggressive:{posSize:30,slippage:25,tp:30,sl:12} };
  const p = presets[level];
  Object.entries(p).forEach(([k,v]) => { S.settings[k]=v; const el=document.getElementById(k); if(el)el.value=v; updateCtrl(k); });

function setMode(mode) {
  if (mode !== 'demo' && !S.walletConnected) {
    notify('Connectez votre wallet Phantom pour le mode ' + (mode === 'semi' ? 'Semi-Auto' : 'Auto'), 'loss');
    return;
  }
  if (mode === 'auto') {
    if (!confirm('⚠ Mode AUTO: le bot exécutera des trades RÉELS sans confirmation. Continuer?')) return;
  }
  S.mode = mode;
  saveState();
  renderHeader();
  notify(`Mode changé: ${mode === 'demo' ? 'Démo' : mode === 'semi' ? 'Semi-Auto' : 'Auto'}`, 'info');
}

function resetState() {
  if (!confirm('Réinitialiser toutes les données? Cette action est irréversible.')) return;
  localStorage.removeItem('axs2');
  S = { ...DEFAULTS };
  saveState();
  renderAll();
  if (chart) { chart.data.labels = S.timeLabels; chart.data.datasets[0].data = S.portfolioHistory; chart.update(); }
  notify('Données réinitialisées', 'info');
}

  n.textContent = msg;
  document.body.appendChild(n);
  setTimeout(() => n.remove(), 3500);
}

      </div>

        <div style="display:flex;justify-content:space-between;font-size:8px;color:var(--text-muted);margin-top:2px"><span>0h</span><span>1j</span><span>7j</span><span>30j</span><span>∞</span></div>

        <div class="perk off" data-lvl="7">🏹 Chasseur Alpha (Nv.7)</div>

    </div>

    <!-- PERFORMANCE -->
    <div class="card">
      <div class="card-h"><span class="card-t">⚡ Performance</span></div>
      <div class="wr-wrap">
        <div class="wr-circ">
          <svg width="90" height="90" viewBox="0 0 90 90">
            <circle class="trk" cx="45" cy="45" r="42"/>
            <circle class="ring" id="wrRing" cx="45" cy="45" r="42"/>
          </svg>

        </div>
      </div>
      <div class="perf-grid">
        <div class="perf-stat"><div class="big" id="avgProfit">0.00%</div><div class="lbl">Profit Moyen</div></div>
        <div class="perf-stat"><div class="big" id="bestTrade" style="color:var(--emerald)">0.00%</div><div class="lbl">Meilleur</div></div>
        <div class="perf-stat"><div class="big" id="worstTrade" style="color:var(--ruby)">0.00%</div><div class="lbl">Pire</div></div>
        <div class="perf-stat"><div class="big" id="stratScore">0</div><div class="lbl">Score Stratégie</div></div>
      </div>
    </div>

    <!-- POSITIONS -->
    <div class="card span2">
      <div class="card-h">
        <span class="card-t">⚔ Positions Actives</span>
        <span class="card-badge" id="posCountBadge" style="background:rgba(212,165,66,.1);color:var(--gold-light);border:1px solid rgba(212,165,66,.2);border-radius:10px">${S.positions.length}</span>
      </div>
      <div class="pos-area" id="posArea"><div class="empty">En attente de signaux...</div></div>
    </div>

    <!-- STRATEGY -->
    <div class="card">
      <div class="card-h">
        <span class="card-t">🎯 Stratégie</span>
        <button class="btn-sm" onclick="resetState()" style="font-size:9px">Reset</button>
      </div>
      <div class="ctrl-grid">
        <div class="risk-row">
          <button class="risk-btn" data-risk="conservative" onclick="setRisk('conservative')">Conservateur</button>
          <button class="risk-btn active" data-risk="balanced" onclick="setRisk('balanced')">Équilibré</button>
          <button class="risk-btn" data-risk="aggressive" onclick="setRisk('aggressive')">Agressif</button>
        </div>
        <div class="ctrl-grp"><label>Taille Max <span id="posSizeV">${S.settings.posSize}%</span></label><input type="range" id="posSize" min="5" max="40" value="${S.settings.posSize}" oninput="updateCtrl('posSize')"></div>
        <div class="ctrl-grp"><label>Slippage <span id="slippageV">${(S.settings.slippage/10).toFixed(1)}%</span></label><input type="range" id="slippage" min="5" max="30" value="${S.settings.slippage}" oninput="updateCtrl('slippage')"></div>
        <div class="ctrl-grp"><label>Take Profit <span id="tpV">+${S.settings.tp}%</span></label><input type="range" id="tp" min="5" max="60" value="${S.settings.tp}" oninput="updateCtrl('tp')"></div>
        <div class="ctrl-grp"><label>Stop Loss <span id="slV">-${S.settings.sl}%</span></label><input type="range" id="sl" min="3" max="20" value="${S.settings.sl}" oninput="updateCtrl('sl')"></div>
        <div style="font-size:10px;color:var(--text-muted);text-transform:uppercase;letter-spacing:1px;margin-top:4px">Signaux Actifs</div>
        <div class="sig-toggles">
          <div class="sig-tog"><span>📈 RSI</span><button class="mtog ${S.signalsEnabled.rsi?'on':''}" data-sig="rsi" onclick="togSig(this)"></button></div>
          <div class="sig-tog"><span>📊 Volume</span><button class="mtog ${S.signalsEnabled.volume?'on':''}" data-sig="volume" onclick="togSig(this)"></button></div>
          <div class="sig-tog"><span>📉 Momentum (EMA)</span><button class="mtog ${S.signalsEnabled.ema?'on':''}" data-sig="ema" onclick="togSig(this)"></button></div>
          <div class="sig-tog"><span>💧 Liquidité</span><button class="mtog ${S.signalsEnabled.liquidity?'on':''}" data-sig="liquidity" onclick="togSig(this)"></button></div>

    <!-- TOKEN SCANNER -->
    <div class="card span2">

      <div class="tok-scroll" id="tokList"><div class="empty">Chargement DexScreener...</div></div>
    </div>

    <!-- HISTORY -->
    <div class="card">
      <div class="card-h"><span class="card-t">📜 Historique</span></div>
      <div class="hist-scroll">
        <table class="hist-tbl"><thead><tr><th>Token</th><th>PnL</th><th>Raison</th><th>Durée</th></tr></thead>
        <tbody id="histBody"><tr><td colspan="4" style="text-align:center;color:var(--text-muted);padding:20px">Aucun trade</td></tr></tbody></table>
      </div>
    </div>

    <!-- CHART -->
    <div class="card span2">
      <div class="card-h"><span class="card-t">📈 Évolution du Portfolio</span></div>
      <div class="chart-wrap"><canvas id="portChart"></canvas></div>
    </div>

    <!-- LEARNING -->
    <div class="card">
      <div class="card-h"><span class="card-t">🧠 Apprentissage</span></div>
      <div class="log-area" id="logArea"></div>
      <div style="margin-top:10px">
        <div style="font-size:10px;color:var(--text-muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:6px">Succès</div>

  </div>

} catch(e) {
  console.error('BUILD HTML ERROR:', e);
  document.getElementById('app').innerHTML = '<div style="color:#e74c3c;padding:40px;">Erreur: '+e.message+'</div>';
}

// Analyzing text animation (CSS-based via class)
const styleExtra = document.createElement('style');
styleExtra.textContent = '.analyzing-text{color:var(--amber);font-size:11px;font-weight:600}.analyzing-text::after{content:"...";animation:dots 1.5s steps(4,end) infinite}@keyframes dots{0%,20%{content:""}40%{content:"."}60%{content:".."}80%,100%{content:"..."}}';
document.head.appendChild(styleExtra);

// ============================================================
// INIT
// ============================================================
try {
  // Initialize adaptive balance for demo mode
  S.tradeableBalance = Math.max(0, S.portfolio - 0.015);
  S.maxPositions = S.maxPositions || 5;
  S.adaptivePosSize = S.adaptivePosSize || S.settings.posSize;
  S.minPosSize = S.minPosSize || 0.1;
  adaptToBalance();
  initChart();
  renderAll();
  startEngine();

  // ============================================================
  // ANTI-SLEEP / PERSISTENCE LAYER
  // ============================================================

  // 1. Wake Lock — empêche l'écran et le CPU de se mettre en veille
  let wakeLock = null;
  async function requestWakeLock() {
    try {
      if ('wakeLock' in navigator) {
        wakeLock = await navigator.wakeLock.request('screen');
        wakeLock.addEventListener('release', () => {
          // Re-acquire on release
          setTimeout(requestWakeLock, 1000);
        });
      }
    } catch(e) { /* Wake lock not supported or denied */ }
  }
  requestWakeLock();

  // 2. Visibility API — détecte quand l'onglet revient au premier plan
  let lastActiveTime = Date.now();
  document.addEventListener('visibilitychange', () => {
    if (document.visibilityState === 'visible') {
      const goneMs = Date.now() - lastActiveTime;
      const goneSec = Math.floor(goneMs / 1000);
      if (goneSec > 10) {
        addLog('🔄', `Retour après ${goneSec > 60 ? Math.floor(goneSec/60) + 'min' : goneSec + 's'} d'inactivité — reprise en cours`);
        // Refresh data immediately
        fetchDexScreenerTokens();
        fetchSolPrice();
        if (S.walletConnected) fetchWalletBalance().catch(() => {});
        renderAll();
      }
      // Re-acquire wake lock (browsers release it on tab hide)
      requestWakeLock();
    }
    lastActiveTime = Date.now();
  });

  // 3. Keep-alive ping — empêche le navigateur de tuer l'onglet inactif
  // Joue un son silencieux en boucle pour garder l'onglet actif
  let keepAliveInterval = null;
  try {
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    keepAliveInterval = setInterval(() => {
      if (audioCtx.state === 'suspended') audioCtx.resume();
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      gain.gain.value = 0.00001; // inaudible
      osc.connect(gain);
      gain.connect(audioCtx.destination);
      osc.start();
      osc.stop(audioCtx.currentTime + 0.01);
    }, 25000);
  } catch(e) { /* AudioContext not available */ }

  // 4. Auto-save renforcé — sauvegarde toutes les 15s
  setInterval(() => { saveState(); }, 15000);

  // 5. Before unload — sauvegarde + avertissement
  window.addEventListener('beforeunload', (e) => {
    saveState();
    if (S.positions.length > 0 && S.mode !== 'demo') {
      e.preventDefault();
      e.returnValue = 'Le bot a des positions ouvertes. Voulez-vous vraiment quitter?';
    }
  });

  // 6. Notification API — alerte même quand l'onglet est caché
  if ('Notification' in window && Notification.permission === 'default') {
    Notification.requestPermission();
  }
  // Override notify to also send browser notification when tab is hidden
  const _origNotify = notify;
  notify = function(msg, type) {
    _origNotify(msg, type);
    if (document.visibilityState === 'hidden' && 'Notification' in window && Notification.permission === 'granted') {
      try {
        new Notification('AXIOM SENTINEL', { body: msg, icon: '⚔', tag: 'axiom-' + Date.now() });
      } catch(e) {}
    }
  };

  addLog('🔒', 'Anti-veille activé — le bot reste actif en arrière-plan');

} catch(e) {
  console.error('INIT ERROR:', e);
  document.getElementById('app').innerHTML = '<div style="color:#e74c3c;padding:40px;font-size:14px;">Erreur init: '+e.message+'</div>';
}

</script>
</body>
